# EE-012 — cargo-deny configuration for the forbidden-dependency audit.
#
# AGENTS.md mandates that the resolved dependency tree must exclude the
# crates listed below. The integration test in `tests/forbidden_deps.rs` is
# the load-bearing gate; this file lets contributors who already use
# `cargo-deny` (https://embarkstudios.github.io/cargo-deny) get the same
# signal locally with `cargo deny check bans`.
#
# Schema reference: https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html

[graph]
all-features = true

[bans]
multiple-versions = "warn"
wildcards = "warn"

# Hard-rule forbidden crates. AGENTS.md `Forbidden Dependencies (Hard Rule,
# Audited By CI)`. Any crate listed here causes `cargo deny check bans` to
# fail.
deny = [
    { name = "tokio" },
    { name = "tokio-util" },
    { name = "async-std" },
    { name = "smol" },
    { name = "rusqlite" },
    { name = "sqlx" },
    { name = "diesel" },
    { name = "sea-orm" },
    { name = "petgraph" },
    { name = "hyper" },
    { name = "axum" },
    { name = "tower" },
    { name = "reqwest" },
]

[licenses]
# License posture is owned elsewhere; this file is scoped to `bans` only.
# Run `cargo deny check bans` (not `cargo deny check`) to use this config.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]

[advisories]
# Advisories are intentionally informational at this stage; gate when M0
# wraps and replace with `version = 2` style ignore lists if needed.
yanked = "warn"
