name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Checkout Franken stack path dependencies
        shell: bash
        run: |
          set -euo pipefail
          project_root="$RUNNER_TEMP/franken-stack/projects"
          mkdir -p "$project_root"
          git clone --depth 1 https://github.com/Dicklesworthstone/asupersync.git "$project_root/asupersync"
          git clone --depth 1 https://github.com/Dicklesworthstone/franken_agent_detection.git "$project_root/franken_agent_detection"
          git clone --depth 1 https://github.com/Dicklesworthstone/franken_networkx.git "$project_root/franken_networkx"
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensearch.git "$project_root/frankensearch"
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensqlite.git "$project_root/frankensqlite"
          git clone --depth 1 https://github.com/Dicklesworthstone/sqlmodel_rust.git "$project_root/sqlmodel_rust"
          git clone --depth 1 https://github.com/Dicklesworthstone/toon_rust.git "$project_root/toon_rust"
          CARGO_PATH_ROOT="$project_root" perl -0pi -e 's#/data/projects#$ENV{CARGO_PATH_ROOT}#g' Cargo.toml

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Forbidden dependency audit
        run: ./scripts/check-forbidden-deps.sh

      - name: Closure linter
        run: ./scripts/closure-lint.sh --audit --json

      - name: Vision coverage
        run: |
          git fetch origin main:refs/remotes/origin/main --depth=1
          sh ./scripts/vision-coverage.sh --json --compare-ref origin/main

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace --lib --bins --tests --examples

      - name: MCP parity tests
        run: cargo test --workspace --features mcp --test mcp_parity

  cross-platform-determinism:
    if: github.event_name != 'schedule'
    name: cross-platform-determinism (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            runner: cross
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Checkout Franken stack path dependencies
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          project_root="$GITHUB_WORKSPACE/.ci/franken-stack/projects"
          mkdir -p "$project_root"
          git clone --depth 1 https://github.com/Dicklesworthstone/asupersync.git "$project_root/asupersync"
          git clone --depth 1 https://github.com/Dicklesworthstone/franken_agent_detection.git "$project_root/franken_agent_detection"
          git clone --depth 1 https://github.com/Dicklesworthstone/franken_networkx.git "$project_root/franken_networkx"
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensearch.git "$project_root/frankensearch"
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensqlite.git "$project_root/frankensqlite"
          git clone --depth 1 https://github.com/Dicklesworthstone/sqlmodel_rust.git "$project_root/sqlmodel_rust"
          git clone --depth 1 https://github.com/Dicklesworthstone/toon_rust.git "$project_root/toon_rust"
          CARGO_PATH_ROOT="$project_root" perl -0pi -e 's#/data/projects#$ENV{CARGO_PATH_ROOT}#g' Cargo.toml

      - name: Checkout Franken stack path dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $projectRoot = Join-Path $env:GITHUB_WORKSPACE ".ci\franken-stack\projects"
          New-Item -ItemType Directory -Force -Path $projectRoot | Out-Null
          git clone --depth 1 https://github.com/Dicklesworthstone/asupersync.git (Join-Path $projectRoot "asupersync")
          git clone --depth 1 https://github.com/Dicklesworthstone/franken_agent_detection.git (Join-Path $projectRoot "franken_agent_detection")
          git clone --depth 1 https://github.com/Dicklesworthstone/franken_networkx.git (Join-Path $projectRoot "franken_networkx")
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensearch.git (Join-Path $projectRoot "frankensearch")
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensqlite.git (Join-Path $projectRoot "frankensqlite")
          git clone --depth 1 https://github.com/Dicklesworthstone/sqlmodel_rust.git (Join-Path $projectRoot "sqlmodel_rust")
          git clone --depth 1 https://github.com/Dicklesworthstone/toon_rust.git (Join-Path $projectRoot "toon_rust")
          $cargoPathRoot = $projectRoot -replace "\\", "/"
          (Get-Content Cargo.toml -Raw).Replace("/data/projects", $cargoPathRoot) | Set-Content Cargo.toml -NoNewline

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.runner == 'cross'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cross-platform graph determinism
        if: matrix.runner != 'cross'
        run: cargo test --workspace --test cross_platform_determinism --target ${{ matrix.target }} -- --nocapture

      - name: Cross-platform graph determinism (cross)
        if: matrix.runner == 'cross'
        run: cross test --workspace --test cross_platform_determinism --target ${{ matrix.target }} -- --nocapture

  windows-msvc-cli-smoke:
    if: github.event_name != 'schedule'
    name: windows-msvc-cli-smoke
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      EE_TEST_SEED: bd-3usjw.68-windows-msvc-cli-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Checkout Franken stack path dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $projectRoot = Join-Path $env:RUNNER_TEMP "franken-stack\projects"
          New-Item -ItemType Directory -Force -Path $projectRoot | Out-Null
          git clone --depth 1 https://github.com/Dicklesworthstone/asupersync.git (Join-Path $projectRoot "asupersync")
          git clone --depth 1 https://github.com/Dicklesworthstone/franken_agent_detection.git (Join-Path $projectRoot "franken_agent_detection")
          git clone --depth 1 https://github.com/Dicklesworthstone/franken_networkx.git (Join-Path $projectRoot "franken_networkx")
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensearch.git (Join-Path $projectRoot "frankensearch")
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensqlite.git (Join-Path $projectRoot "frankensqlite")
          git clone --depth 1 https://github.com/Dicklesworthstone/sqlmodel_rust.git (Join-Path $projectRoot "sqlmodel_rust")
          git clone --depth 1 https://github.com/Dicklesworthstone/toon_rust.git (Join-Path $projectRoot "toon_rust")
          $cargoPathRoot = $projectRoot -replace "\\", "/"
          (Get-Content Cargo.toml -Raw).Replace("/data/projects", $cargoPathRoot) | Set-Content Cargo.toml -NoNewline

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc

      - name: Windows path resolver and binary smoke test
        shell: pwsh
        run: cargo test --workspace --test e2e_windows_smoke --target x86_64-pc-windows-msvc -- --nocapture

      - name: Build ee for PowerShell smoke script
        shell: pwsh
        run: cargo build --workspace --bin ee --target x86_64-pc-windows-msvc

      - name: PowerShell walking-skeleton smoke
        shell: pwsh
        run: >
          ./scripts/e2e_windows_smoke.ps1
          -EeBinary "target/x86_64-pc-windows-msvc/debug/ee.exe"
          -WorkspaceRoot "$env:RUNNER_TEMP/ee-windows-msvc-cli-smoke"
          -LogPath "$env:RUNNER_TEMP/ee-windows-msvc-cli-smoke.jsonl"

      - name: Upload Windows smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-msvc-cli-smoke-log
          path: ${{ runner.temp }}/ee-windows-msvc-cli-smoke.jsonl

  install-pipeline-smoke:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: install-pipeline-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq ca-certificates curl xz-utils

      - name: Install jq
        if: runner.os == 'macOS'
        run: brew install jq

      - name: Audit install pipeline
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/audit_install_pipeline.sh

      - name: Read audit decision
        id: audit
        shell: bash
        run: |
          DECIDED_PATH="$(jq -r '.decided_path' tests/audit_artifacts/latest_install_pipeline.json)"
          LATEST_TAG="$(jq -r '.github_releases.releases[0].tagName // ""' tests/audit_artifacts/latest_install_pipeline.json)"
          echo "decided_path=$DECIDED_PATH" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Install pipeline path: $DECIDED_PATH"
          echo "Latest release tag: ${LATEST_TAG:-none}"

      - name: Upload install audit
        uses: actions/upload-artifact@v4
        with:
          name: install-pipeline-audit-${{ runner.os }}
          path: tests/audit_artifacts/install_pipeline_*.json

      - name: Skip live smoke until first release
        if: steps.audit.outputs.decided_path != 'path_a_post_release'
        run: |
          echo "::notice title=Install pipeline pre-release::Skipping live installer smoke until GitHub release, Homebrew tap, and crates.io ownership are ready."

      - name: Linux installer smoke
        if: steps.audit.outputs.decided_path == 'path_a_post_release' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          for image in ubuntu:24.04 debian:bookworm-slim; do
            docker run --rm -e EE_RELEASE_TAG="${{ steps.audit.outputs.latest_tag }}" "$image" sh -eu -c '
              apt-get update
              apt-get install -y curl ca-certificates xz-utils
              curl -fsSL "https://github.com/Dicklesworthstone/eidetic_engine_cli/releases/download/${EE_RELEASE_TAG}/install.sh" \
                | EE_VERSION="${EE_RELEASE_TAG}" sh
              export PATH="$HOME/.local/bin:$PATH"
              EE_EXPECTED_VERSION="${EE_RELEASE_TAG#v}"
              ee --version | grep -F "$EE_EXPECTED_VERSION"
              ee doctor --json
            '
          done

      - name: macOS installer smoke
        if: steps.audit.outputs.decided_path == 'path_a_post_release' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/Dicklesworthstone/eidetic_engine_cli/releases/download/${{ steps.audit.outputs.latest_tag }}/install.sh \
            | EE_VERSION="${{ steps.audit.outputs.latest_tag }}" EE_INSTALL_DIR="$RUNNER_TEMP/ee-bin" sh
          export PATH="$RUNNER_TEMP/ee-bin:$PATH"
          EE_EXPECTED_VERSION="${{ steps.audit.outputs.latest_tag }}"
          EE_EXPECTED_VERSION="${EE_EXPECTED_VERSION#v}"
          ee --version | grep -F "$EE_EXPECTED_VERSION"
          ee doctor --json

      - name: Homebrew installer smoke
        if: steps.audit.outputs.decided_path == 'path_a_post_release' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew install Dicklesworthstone/tap/ee
          EE_EXPECTED_VERSION="${{ steps.audit.outputs.latest_tag }}"
          EE_EXPECTED_VERSION="${EE_EXPECTED_VERSION#v}"
          ee --version | grep -F "$EE_EXPECTED_VERSION"
          ee doctor --json

      - name: Cargo installer smoke
        if: steps.audit.outputs.decided_path == 'path_a_post_release'
        shell: bash
        run: |
          set -euo pipefail
          export CARGO_HOME="$RUNNER_TEMP/clean-cargo-home"
          export PATH="$CARGO_HOME/bin:$PATH"
          cargo install eidetic-engine
          EE_EXPECTED_VERSION="${{ steps.audit.outputs.latest_tag }}"
          EE_EXPECTED_VERSION="${EE_EXPECTED_VERSION#v}"
          ee --version | grep -F "$EE_EXPECTED_VERSION"
          ee doctor --json
