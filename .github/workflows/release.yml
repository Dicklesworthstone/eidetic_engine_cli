name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    # GitHub does not evaluate path filters for tag pushes, so v* tags
    # still trigger releases even though branch pushes are Cargo.toml-scoped.
    paths:
      - 'Cargo.toml'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: version
        run: |
          set -euo pipefail
          # Extract current version from Cargo.toml
          CURRENT=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT"

          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$CURRENT" != "$TAG_VERSION" ]; then
              echo "::error title=Version mismatch::Tag $GITHUB_REF_NAME does not match Cargo.toml version $CURRENT"
              exit 1
            fi
            echo "Running release from existing tag $GITHUB_REF_NAME"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract previous version
          git show HEAD^:Cargo.toml > /tmp/prev_cargo.toml 2>/dev/null || echo 'version = "0.0.0"' > /tmp/prev_cargo.toml
          PREVIOUS=$(grep '^version = ' /tmp/prev_cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Previous version: $PREVIOUS"

          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "Version changed from $PREVIOUS to $CURRENT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  gates:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Forbidden dependency audit
        run: ./scripts/check-forbidden-deps.sh

      - name: Closure linter
        run: ./scripts/closure-lint.sh --json

      - name: Vision coverage gate
        run: |
          set -euo pipefail
          VISION_COVERAGE_RELEASE_TAG=true sh ./scripts/vision-coverage.sh --json
          GAP=$(jq -r '.gap_percentage' .vision-coverage-report.json)
          if [ "$GAP" != "0" ]; then
            echo "::error title=Vision coverage gap::Release blocked: ${GAP}% of documented surfaces are missing or stubbed"
            exit 1
          fi

      - name: Performance benchmarks
        run: |
          set -euo pipefail
          ./scripts/bench_perf_regression.sh --check-regression --json > ee-perf.v1.json
          ./scripts/sync_perf_table.sh --input benches/baselines/perf_v0_2.json --readme README.md --check
          echo "::notice title=Performance results::Benchmark artifact generated"

      - name: Upload perf artifact
        uses: actions/upload-artifact@v4
        with:
          name: ee-perf
          path: ee-perf.v1.json

  tag:
    needs: [check-version, gates]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and push tag
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-version.outputs.version }}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="$GITHUB_REF_NAME"
            echo "Using existing tag: $TAG"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create annotated tag
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"

  build:
    needs: [check-version, tag]
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ee dist/
          cd dist
          tar -cJf ee-${{ matrix.target }}.tar.xz ee
          sha256sum ee-${{ matrix.target }}.tar.xz > ee-${{ matrix.target }}.tar.xz.sha256
          rm ee

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/ee.exe dist/
          Set-Location dist
          tar -cJf ee-${{ matrix.target }}.tar.xz ee.exe
          (Get-FileHash ee-${{ matrix.target }}.tar.xz -Algorithm SHA256).Hash.ToLower() + "  ee-${{ matrix.target }}.tar.xz" | Out-File -Encoding ASCII ee-${{ matrix.target }}.tar.xz.sha256
          Remove-Item ee.exe

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign with Sigstore
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          cosign sign-blob --yes \
            --bundle ee-${{ matrix.target }}.tar.xz.sigstore.json \
            ee-${{ matrix.target }}.tar.xz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/ee-${{ matrix.target }}.tar.xz
            dist/ee-${{ matrix.target }}.tar.xz.sha256
            dist/ee-${{ matrix.target }}.tar.xz.sigstore.json
          retention-days: 1

  release:
    needs: [check-version, tag, build]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release
          artifact_count="$(find artifacts -maxdepth 1 -type f | wc -l | tr -d '[:space:]')"
          if [ "$artifact_count" -eq 0 ]; then
            echo "::error title=Missing release artifacts::No build artifacts were downloaded for release publication."
            exit 1
          fi
          find artifacts -maxdepth 1 -type f -exec mv {} release/ \;

          # Copy install scripts
          cp install.sh release/
          cp install.ps1 release/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify Sigstore bundles
        run: |
          set -euo pipefail
          CERT_IDENTITY_REGEXP='^https://github\.com/Dicklesworthstone/eidetic_engine_cli/\.github/workflows/release\.yml@refs/(tags/v[0-9].*|heads/main)$'
          CERT_OIDC_ISSUER='https://token.actions.githubusercontent.com'
          for artifact in release/ee-*.tar.xz; do
            bundle="${artifact}.sigstore.json"
            if [ ! -f "$bundle" ]; then
              echo "::error title=Missing Sigstore bundle::Expected $bundle for $artifact"
              exit 1
            fi
            cosign verify-blob \
              --bundle "$bundle" \
              --certificate-identity-regexp "$CERT_IDENTITY_REGEXP" \
              --certificate-oidc-issuer "$CERT_OIDC_ISSUER" \
              "$artifact"
          done

      - name: Generate release notes
        id: notes
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-version.outputs.version }}"
          TAG="${{ needs.tag.outputs.tag }}"
          NOTES=""

          # Try to extract from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Extract section for this version
            NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '$d' | tail -n +2)
          fi

          # Fallback to git log
          if [ -z "$NOTES" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log -50 --pretty=format:"- %s" "${PREV_TAG}..HEAD")
            else
              NOTES=$(git log -20 --pretty=format:"- %s")
            fi
          fi

          # Write release notes without an expanding heredoc; markdown
          # backtick fences would otherwise be parsed as command substitution.
          {
            printf '%s\n\n' '## Installation'
            printf '%s\n' '### Unix (Linux/macOS)'
            printf '%s\n' '```bash'
            printf 'curl -fsSL https://github.com/Dicklesworthstone/eidetic_engine_cli/releases/download/%s/install.sh \\\n' "$TAG"
            printf '  | EE_VERSION="%s" sh\n' "$TAG"
            printf '%s\n\n' '```'
            printf '%s\n' '### Windows (PowerShell)'
            printf '%s\n' '```powershell'
            printf '& ([scriptblock]::Create((iwr -useb https://github.com/Dicklesworthstone/eidetic_engine_cli/releases/download/%s/install.ps1).Content)) -Version "%s"\n' "$TAG" "$VERSION"
            printf '%s\n\n' '```'
            printf '%s\n\n' '## Verification'
            printf '%s\n' 'All release artifacts are signed with Sigstore. Verify with:'
            printf '%s\n' '```bash'
            printf '%s\n' 'cosign verify-blob \'
            printf '%s\n' '  --bundle ee-<target>.tar.xz.sigstore.json \'
            printf '%s\n' '  --certificate-identity-regexp "^https://github\.com/Dicklesworthstone/eidetic_engine_cli/\.github/workflows/release\.yml@refs/(tags/v[0-9].*|heads/main)$" \'
            printf '%s\n' '  --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \'
            printf '%s\n' '  ee-<target>.tar.xz'
            printf '%s\n\n' '```'
            printf '%s\n\n' '## Changes'
          } > release_notes.md
          echo "$NOTES" >> release_notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.tag.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "ee $TAG" \
              --notes-file release_notes.md
            gh release upload "$TAG" release/* --clobber
          else
            gh release create "$TAG" \
              --title "ee $TAG" \
              --notes-file release_notes.md \
              release/*
          fi

  smoke-test:
    needs: [check-version, tag, release]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-24.04
            image: ubuntu:24.04
          - name: debian-bookworm-slim
            image: debian:bookworm-slim
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install dependencies
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y curl ca-certificates xz-utils

      - name: Download and install ee
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/Dicklesworthstone/eidetic_engine_cli/releases/download/${{ needs.tag.outputs.tag }}/install.sh \
            | EE_VERSION="${{ needs.tag.outputs.tag }}" bash

      - name: Verify installation
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          ee --version | grep -F "${{ needs.check-version.outputs.version }}"
          ee --help
          ee doctor --json

  smoke-test-macos:
    needs: [check-version, tag, release]
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Download and install ee
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/Dicklesworthstone/eidetic_engine_cli/releases/download/${{ needs.tag.outputs.tag }}/install.sh \
            | EE_VERSION="${{ needs.tag.outputs.tag }}" EE_INSTALL_DIR="$RUNNER_TEMP/ee-bin" bash

      - name: Verify installation
        run: |
          set -euo pipefail
          export PATH="$RUNNER_TEMP/ee-bin:$PATH"
          ee --version | grep -F "${{ needs.check-version.outputs.version }}"
          ee --help
          ee doctor --json

  update-homebrew:
    needs: [check-version, tag, release, smoke-test, smoke-test-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for release assets
        run: sleep 30

      - name: Generate Homebrew formula
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-version.outputs.version }}"
          ./scripts/homebrew/update-formula.sh "$VERSION" > ee.rb
          cat ee.rb

      - name: Create PR to homebrew-tap
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-version.outputs.version }}"
          if [ -z "${GITHUB_TOKEN:-}" ]; then
            echo "::warning title=Homebrew tap token missing::Skipping Homebrew tap PR because HOMEBREW_TAP_TOKEN is not configured."
            exit 0
          fi

          # Clone the tap repo
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/Dicklesworthstone/homebrew-tap.git" tap
          cd tap

          # Create or update formula
          mkdir -p Formula
          cp ../ee.rb Formula/ee.rb

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch and PR
          BRANCH="update-ee-v${VERSION}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" FETCH_HEAD
          else
            git checkout -b "$BRANCH"
          fi
          git add Formula/ee.rb
          if git diff --cached --quiet; then
            echo "::notice title=Homebrew formula unchanged::Formula/ee.rb already matches v${VERSION}; skipping tap PR."
            exit 0
          fi
          git commit -m "Update ee to v${VERSION}"
          git push origin "$BRANCH"

          if gh pr list --head "$BRANCH" --base main --state open --json number --jq 'length' | grep -qx '0'; then
            gh pr create \
              --title "Update ee to v${VERSION}" \
              --body "Automated update from ee release workflow." \
              --head "$BRANCH" \
              --base main
          else
            echo "::notice title=Homebrew PR already open::A PR already exists for $BRANCH."
          fi
