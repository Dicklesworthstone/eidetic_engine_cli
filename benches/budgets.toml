# Performance budgets for ee benchmarks (eidetic_engine_cli-htjd)
#
# These values define the pass/fail thresholds for CI. Regressions beyond
# the specified percentages fail the bench job.
#
# Schema: ee.perf.budgets.v1
# Source: baselines/v0.1.json, README performance table

[meta]
schema = "ee.perf.budgets.v1"
version = "0.1.0"
regression_pct_p50 = 20   # Fail if p50 regresses > 20%
regression_pct_p99 = 50   # Fail if p99 regresses > 50%
budget_mode = "advisory"

[profiles.ci-smoke]
description = "Smallest RCH-friendly no-mock smoke profile for PR and agent closeout checks"
ci_suitability = "normal_ci"
workload_tier = "small"
benches = [
  "status",
  "pack_replay_freshness_smoke",
]
sample_size = 10
measurement_time_secs = 0.5
release_blocking = false
advisory = true

[profiles.nightly]
description = "Broader nightly profile over all Criterion benchmark groups"
ci_suitability = "nightly_ci"
workload_tier = "medium"
benches = [
  "remember",
  "search",
  "context",
  "context_with_ppr",
  "pack_size",
  "why",
  "outcome",
  "status",
  "workspace_init",
  "audit_query",
  "index_rebuild",
  "concurrent_writes",
  "import_cass",
  "link",
  "graph_pagerank",
  "graph_ppr",
  "graph_louvain",
  "graph_ktruss",
  "graph_gomory_hu",
  "graph_hits",
  "curate_candidates",
]
sample_size = 20
measurement_time_secs = 2.0
release_blocking = false
advisory = true

[profiles.stress]
description = "Large-machine exploratory profile for 256GB+/64-core validation runs"
ci_suitability = "local_256gb"
workload_tier = "stress"
benches = [
  "remember",
  "search",
  "context",
  "context_with_ppr",
  "pack_size",
  "why",
  "outcome",
  "status",
  "workspace_init",
  "audit_query",
  "index_rebuild",
  "concurrent_writes",
  "import_cass",
  "link",
  "graph_pagerank",
  "graph_ppr",
  "graph_louvain",
  "graph_ktruss",
  "graph_gomory_hu",
  "graph_hits",
  "curate_candidates",
]
sample_size = 100
measurement_time_secs = 5.0
release_blocking = false
advisory = true

