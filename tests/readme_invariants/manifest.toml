schema = "ee.readme_invariants.v1"

[scrubber]
# Each regex documents a deliberate false-positive filter for
# tests/readme_invariant_harness.rs. Read each as: "this README line
# triggers the invariant scanner but is descriptive prose, command-
# table syntax, or a recovery instruction — not a load-bearing
# invariant."
#
# Patterns use TOML literal strings (single quotes) so a single
# backslash maps directly to a regex escape.
denylist_regexes = [
  '(?i)must (be|have) been',
  '(?i)you may need',
  '^Every fresh agent session walks in blank',
  '^`ee` is a single-binary Rust CLI',
  '^Every returned memory answers six questions',
  '^- \*\*How fresh\?\*\* Recency decay term\.$',
  '^install paths below are planned surfaces',
  '^The current audit \(`scripts/audit_install_pipeline\.sh`\) reports',
  '^`ee doctor` checks',
  '^Use full output when a harness needs every source array',
  '^\d+\. Inspect recommendations, blocked beads',
  '^\d+\. Reserve edit surfaces through Agent Mail',
  '^performance forensics diagnose host behavior',
  '`"shipped": false` as documentation for a future surface',
  '^memories across retrieval or packing changes\. The report is a deterministic',
  '\(`semantic` -> `episodic`\), and decay/tombstone maintenance',
  '`procedural` -> `semantic`\. Every successful',
  '^transition writes a `memory\.level_transition` audit row',
  '^Every memory carries: `id`, `level`, `kind`',
  '^`ee` consumes `coding_agent_session_search`',
  '^Backups include the durable DB/JSONL source of truth',
  '^Measured on a 2024 MacBook Pro M3',
  '^# Exploratory large-machine run',
  '^Budgets are currently advisory while deterministic scale fixtures stabilize\.$',
  '^coverage test keeps every row in the table above',
  '^- \*\*Not a chat UI\.\*\*',
  '^- \*\*Not a permanent archive\.\*\*',
  '^- \*\*The CLI is primary; MCP sits on top of it',
  '^On a typical multi-project developer machine',
  '^\[`docs/adr/`\]\(docs/adr/\)\. Every major subsystem has an ADR',
]

