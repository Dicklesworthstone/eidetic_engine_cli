# D8 cross-renderer parity matrix — intentional-omissions allowlist
#
# Owned by bd-17c65.4.9 (D8). The full parity-matrix test
# (`tests/renderer_parity_matrix.rs` — landed under D8.1 follow-up
# `bd-17c65.4.9.1`) walks every (renderer, canonical_field) pair and
# asserts the field lands in the right place. Some omissions are
# *intentional* and documented here so the matrix test allows them.
#
# Schema (each entry):
#
#   [[omission]]
#   renderer = "human" | "json" | "toon" | "jsonl" | "compact" | "hook" | "markdown"
#   field = "pack.items[].scoreBreakdown" | …
#   reason = "format_native_omission" | "compact_intentional_drop"
#   rationale = "<one-line human-readable rationale>"
#   since_schema = "ee.context.v1" | …
#
# `reason` values:
#   - `format_native_omission` — the format is structurally incapable
#     of carrying this field (e.g. mermaid is a diagram-only output,
#     not a record carrier; it omits per-item scoring).
#   - `compact_intentional_drop` — the format chooses to drop the
#     field to stay within its size discipline (e.g. compact format
#     drops provenance footers to fit budgets).
#
# CI gate: tests/renderer_parity_matrix.rs (D8.1) asserts that any
# omitted field has a matching entry here. Adding an omission without
# a registry entry fails CI; removing a field that was previously
# omitted by design also requires removing its entry here.
#
# Bead: bd-17c65.4.9 (D8). Per-renderer matrix is bd-17c65.4.9.1
# (D8.1) once the canonical pack tree from bd-17c65.4 (D-series)
# stabilizes.

# === Mermaid: diagram-only output ===========================================
# Mermaid is intentionally a diagram-only output format that maps to
# Renderer::Markdown but renders graph/sequence diagrams of pack
# structure rather than the literal record content. Per-item record
# fields are structurally absent.

[[omission]]
renderer = "markdown"
field = "pack.items[].scoreBreakdown.componentByComponent"
reason = "format_native_omission"
rationale = "Mermaid (which shares output::Renderer::Markdown) renders structural diagrams, not per-component score tables."
since_schema = "ee.context.v1"

[[omission]]
renderer = "markdown"
field = "pack.budget.maxTokens"
reason = "format_native_omission"
rationale = "Mermaid (which shares output::Renderer::Markdown) is a diagram of pack topology, not a budget record carrier."
since_schema = "ee.context.v1"

[[omission]]
renderer = "markdown"
field = "pack.items[].content"
reason = "format_native_omission"
rationale = "Mermaid (which shares output::Renderer::Markdown) shows item/source nodes and intentionally omits prompt body text."
since_schema = "ee.context.v1"

[[omission]]
renderer = "markdown"
field = "pack.items[].why"
reason = "format_native_omission"
rationale = "Mermaid (which shares output::Renderer::Markdown) renders graph edges and leaves explanatory rationale to Markdown or JSON."
since_schema = "ee.context.v1"

[[omission]]
renderer = "markdown"
field = "pack.items[].scores.relevance"
reason = "format_native_omission"
rationale = "Mermaid (which shares output::Renderer::Markdown) omits per-item scores because the output is structural graph syntax."
since_schema = "ee.context.v1"

[[omission]]
renderer = "markdown"
field = "pack.selectionAudit"
reason = "format_native_omission"
rationale = "Markdown and Mermaid carry selected item rationale inline; the full structured selection audit remains in JSON/TOON."
since_schema = "ee.context.v1"

[[omission]]
renderer = "markdown"
field = "pack.provenanceFooter"
reason = "format_native_omission"
rationale = "Markdown and Mermaid show provenance at item/source edges instead of emitting the aggregate provenance footer object."
since_schema = "ee.context.v1"

[[omission]]
renderer = "markdown"
field = "data.degraded[]"
reason = "format_native_omission"
rationale = "Mermaid (which shares output::Renderer::Markdown) omits degradation prose so the output remains valid diagram syntax."
since_schema = "ee.context.v1"

# === Compact: size-discipline drops =========================================
# The `compact` format prioritizes byte budget over provenance richness.
# It drops fields that are valuable for forensics but cost bytes per
# record.

[[omission]]
renderer = "compact"
field = "pack.items[].provenance.entries[]"
reason = "compact_intentional_drop"
rationale = "Compact format keeps a single provenance summary string per item rather than the full entries array."
since_schema = "ee.context.v1"

[[omission]]
renderer = "compact"
field = "pack.query"
reason = "compact_intentional_drop"
rationale = "Compact format keeps the query value as the first tab-separated cell rather than a named pack.query field."
since_schema = "ee.context.v1"

[[omission]]
renderer = "compact"
field = "pack.items[].content"
reason = "compact_intentional_drop"
rationale = "Compact format keeps only top item IDs and pack sizing so shell consumers avoid prompt-body payload expansion."
since_schema = "ee.context.v1"

[[omission]]
renderer = "compact"
field = "pack.items[].why"
reason = "compact_intentional_drop"
rationale = "Compact format omits per-item rationale text to preserve its fixed-width summary contract."
since_schema = "ee.context.v1"

[[omission]]
renderer = "compact"
field = "pack.items[].provenance"
reason = "compact_intentional_drop"
rationale = "Compact format intentionally omits provenance details; JSON and Markdown remain the forensic surfaces."
since_schema = "ee.context.v1"

[[omission]]
renderer = "compact"
field = "pack.items[].scores.relevance"
reason = "compact_intentional_drop"
rationale = "Compact format omits scores and keeps only query, item count, budget, top IDs, and hash."
since_schema = "ee.context.v1"

[[omission]]
renderer = "compact"
field = "pack.selectionAudit"
reason = "compact_intentional_drop"
rationale = "Compact format omits the selection audit so one-line hook-adjacent summaries stay small."
since_schema = "ee.context.v1"

[[omission]]
renderer = "compact"
field = "pack.provenanceFooter"
reason = "compact_intentional_drop"
rationale = "Compact format omits the provenance footer because provenance-rich inspection belongs to JSON/Markdown."
since_schema = "ee.context.v1"

[[omission]]
renderer = "compact"
field = "data.degraded[]"
reason = "compact_intentional_drop"
rationale = "Compact format omits degraded details; callers that need repair guidance should use JSON, hook, or Markdown."
since_schema = "ee.context.v1"

[[omission]]
renderer = "compact"
field = "pack.selectionAudit.steps[]"
reason = "compact_intentional_drop"
rationale = "Compact format keeps only the selection summary; per-step deltas live in the verbose audit."
since_schema = "ee.context.v1"

# === Hook: hook-consumer minimal contract ===================================
# The `hook` format is the contract for Claude Code / Codex PreToolUse
# style hooks: they need a tight subset of fields to insert into the
# next prompt, not the full pack record.

[[omission]]
renderer = "hook"
field = "pack.selectionAudit"
reason = "format_native_omission"
rationale = "Hook consumers care about pack.items[].content and pack.text; the audit metadata is not part of the hook contract."
since_schema = "ee.context.v1"

[[omission]]
renderer = "hook"
field = "pack.query"
reason = "format_native_omission"
rationale = "Hook output is keyed by pack_id and prompt items; the initiating query is intentionally not part of the hook contract."
since_schema = "ee.context.v1"

[[omission]]
renderer = "hook"
field = "pack.budget.maxTokens"
reason = "format_native_omission"
rationale = "Hook output carries total selected tokens but omits maxTokens because hooks consume the already-built prompt fragment."
since_schema = "ee.context.v1"

[[omission]]
renderer = "hook"
field = "pack.items[].why"
reason = "format_native_omission"
rationale = "Hook output inserts memory content into an agent prompt and leaves rationale inspection to JSON or Markdown."
since_schema = "ee.context.v1"

[[omission]]
renderer = "hook"
field = "pack.items[].provenance"
reason = "format_native_omission"
rationale = "Hook output omits provenance to keep prompt injection surfaces compact and relies on JSON/Markdown for audit detail."
since_schema = "ee.context.v1"

[[omission]]
renderer = "hook"
field = "pack.items[].scores.relevance"
reason = "format_native_omission"
rationale = "Hook output omits scoring fields because hooks only need selected content and token counts."
since_schema = "ee.context.v1"

[[omission]]
renderer = "hook"
field = "pack.provenanceFooter"
reason = "format_native_omission"
rationale = "Hook output omits aggregate provenance footer metadata; forensic consumers should use JSON."
since_schema = "ee.context.v1"

# === Human: operator summary, not structured record carrier =================

[[omission]]
renderer = "human"
field = "pack.items[].content"
reason = "format_native_omission"
rationale = "Human context output lists selected items and next steps; Markdown is the human-readable prompt body with content."
since_schema = "ee.context.v1"

[[omission]]
renderer = "human"
field = "pack.items[].why"
reason = "format_native_omission"
rationale = "Human context output summarizes selected items and leaves detailed rationale to JSON or Markdown."
since_schema = "ee.context.v1"

[[omission]]
renderer = "human"
field = "pack.items[].provenance"
reason = "format_native_omission"
rationale = "Human context output omits per-item provenance to stay scannable; Markdown and JSON retain source details."
since_schema = "ee.context.v1"

[[omission]]
renderer = "human"
field = "pack.items[].scores.relevance"
reason = "format_native_omission"
rationale = "Human context output omits score components because the operator summary is not a scoring audit surface."
since_schema = "ee.context.v1"

[[omission]]
renderer = "human"
field = "pack.selectionAudit"
reason = "format_native_omission"
rationale = "Human context output omits the structured selection audit and points users to JSON for the full contract."
since_schema = "ee.context.v1"

[[omission]]
renderer = "human"
field = "pack.provenanceFooter"
reason = "format_native_omission"
rationale = "Human context output omits the aggregate provenance footer because it is an operator summary."
since_schema = "ee.context.v1"

# === JSONL: stream record subset ============================================

[[omission]]
renderer = "jsonl"
field = "pack.items[].scores.relevance"
reason = "format_native_omission"
rationale = "JSONL context output streams selected item records and omits score components to keep each line compact."
since_schema = "ee.context.v1"

[[omission]]
renderer = "jsonl"
field = "pack.selectionAudit"
reason = "format_native_omission"
rationale = "JSONL context output is a streaming item contract and omits the nested selection audit object."
since_schema = "ee.context.v1"

[[omission]]
renderer = "jsonl"
field = "pack.provenanceFooter"
reason = "format_native_omission"
rationale = "JSONL context output repeats per-item provenance and omits the aggregate provenance footer object."
since_schema = "ee.context.v1"
